baseURL = "https://blog.ottoelysia.top/"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
title = "OttoElysia Blog"
theme = "stack"
enableRobotsTXT = true
enableEmoji = true
paginate = 5

[Languages]
[Languages.zh]
languageName = "中文"
weight = 1
title = "OttoElysia Blog"

[Languages.zh.params]
description = "记录日常折腾的过程与思考"

[Languages.zh.params.sidebar]
subtitle = "日常折腾记录 ✨"

[Languages.zh.params.sidebar.avatar]
enabled = true
local = true
src = "images/avatar.png"

[[Languages.zh.params.menu.social]]
identifier = "github"
name = "GitHub"
url = "https://github.com/ottoelysia688-beep"
weight = 1

[Languages.zh.params.article]

[Languages.zh.params.article.license]
enabled = false

[Languages.zh.params.article.readingTime]
enabled = true

[markup]
[markup.highlight]
style = "github-dark"
lineNos = false
codeFences = true
guessSyntax = true

[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[outputs]
home = ["HTML", "RSS", "JSON"]
