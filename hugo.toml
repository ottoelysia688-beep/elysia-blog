baseURL = "https://blog.ottoelysia.top/"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
title = "OttoElysia Blog"
theme = "PaperMod"
enableRobotsTXT = true
enableEmoji = true

[pagination]
pageSize = 5

[params]
defaultTheme = "auto"
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowToc = true
TocOpen = false
description = "记录日常折腾的过程与思考"
author = "Elysia"
DateFormat = "2006-01-02"

  [params.homeInfoParams]
  Title = "👋 Hey there~"
  Content = "欢迎来到我的博客！这里记录日常折腾的过程与思考。"

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/ottoelysia688-beep"

[params.assets]
favicon = "/favicon.ico"

[markup]
  [markup.highlight]
  style = "github-dark"
  lineNos = false
  codeFences = true
  guessSyntax = true

[outputs]
home = ["HTML", "RSS", "JSON"]
