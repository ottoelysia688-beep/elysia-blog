<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Logging in...</title>
    <script>
        // Decap CMS OAuth callback handler
        // This page receives the GitHub OAuth code and passes it to the CMS
        window.opener.postMessage(
            'authorization:github:success:{"provider":"github","token":"' + new URLSearchParams(window.location.search).get('code') + '"}',
            '*'
        );
        setTimeout(function() { window.close(); }, 100);
    </script>
</head>
<body>
    <p>Logging in... Please wait.</p>
</body>
</html>
